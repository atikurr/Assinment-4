<!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/style.css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Job Tracker</title>

        <!-- awesome cdn -->
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      </head>
      <body class="p-4 md:p-10">
        <div class="max-w-5xl mx-auto">
          <h1 class="text-2xl font-extrabold text-[#1E293B] mb-8">
            Job Application Tracker
          </h1>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div
              class="bg-white p-6 rounded-lg border border-gray-100 shadow-sm hover:border-blue-300 transition-colors"
            >
              <p class="text-xs font-semibold text-gray-500 mb-1">Total</p>
              <h2
                id="count-total"
                class="text-2xl font-bold text-blue-600 tracking-tight"
              >
                8
              </h2>
            </div>
            <div
              class="bg-white p-6 rounded-lg border border-gray-100 shadow-sm hover:border-green-300 transition-colors"
            >
              <p class="text-xs font-semibold text-gray-500 mb-1">Interview</p>
              <h2
                id="count-interview"
                class="text-2xl font-bold text-green-600 tracking-tight"
              >
                0
              </h2>
            </div>
            <div
              class="bg-white p-6 rounded-lg border border-gray-100 shadow-sm hover:border-red-300 transition-colors"
            >
              <p class="text-xs font-semibold text-gray-500 mb-1">Rejected</p>
              <h2
                id="count-rejected"
                class="text-2xl font-bold text-red-600 tracking-tight"
              >
                0
              </h2>
            </div>
          </div>

          <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-gray-800">Available Jobs</h3>
            <p
              id="job-count-display"
              class="text-sm text-gray-500 font-medium bg-white px-3 py-1 rounded-full border border-gray-100"
            >
              8 jobs
            </p>
          </div>

          <div class="flex gap-2 mb-8">
            <button
              onclick="setTab('all')"
              id="tab-all"
              class="tab-btn-active px-5 py-1.5 rounded text-sm font-semibold"
            >
              All
            </button>
            <button
              onclick="setTab('interview')"
              id="tab-interview"
              class="tab-btn-inactive px-5 py-1.5 rounded text-sm font-semibold"
            >
              Interview
            </button>
            <button
              onclick="setTab('rejected')"
              id="tab-rejected"
              class="tab-btn-inactive btn-primary px-5 py-1.5 rounded text-sm font-semibold"
            >
              Rejected
            </button>
          </div>

          <div id="job-list-container" class="space-y-4"></div>

          <div
            id="no-data-state"
            class="hidden flex-col items-center justify-center py-20 bg-white rounded-xl border border-dashed border-gray-300"
          >
            <img
              src="./images/jobs.png"
              class="w-20 mb-4 opacity-100"
              alt="jobs"
            />
            <h4 class="text-lg font-bold text-gray-700">No jobs available</h4>
            <p class="text-sm text-gray-400">
              Check back  for new opportunities
            </p>
          </div>
        </div>

        <script src="./script/script.js"></script>
      </body>
    </html>
  </body>
</html>
